<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>HBD Abil 🎉</title>
<style>
    body{
        margin:0;
        font-family: Comic Sans MS, cursive;
        background: linear-gradient(135deg,#ff9a9e,#fad0c4);
        text-align:center;
        overflow:hidden;
    }

    h1{
        font-size:50px;
        margin-top:80px;
        color:#fff;
        text-shadow:2px 2px 5px #000;
        animation: goyang 1s infinite alternate;
    }

    p{
        font-size:20px;
        color:#222;
        background:white;
        display:inline-block;
        padding:15px 25px;
        border-radius:20px;
        margin-top:20px;
    }

    button{
        margin-top:30px;
        padding:15px 30px;
        font-size:18px;
        border:none;
        border-radius:30px;
        background:#ff4d6d;
        color:white;
        cursor:pointer;
        transition:0.3s;
    }

    button:hover{
        transform:scale(1.1);
    }

    @keyframes goyang{
        from{transform:rotate(-3deg)}
        to{transform:rotate(3deg)}
    }

    .confetti{
        position:absolute;
        width:10px;
        height:10px;
        background:red;
        top:-10px;
        animation:jatuh 5s linear infinite;
    }

    @keyframes jatuh{
        to{
            transform:translateY(100vh) rotate(360deg);
        }
    }
</style>
</head>

<body>

<h1>🎉 HBD ABIL 🎉</h1>

<p>
Selamat ulang tahun Abil!<br>
Semoga panjang umur, sehat selalu,<br>
dan semoga otakmu segera update ke versi terbaru 🤣
</p>

<br>

<button onclick="pesan()">Klik kalau masih hidup</button>

<script>

function pesan(){
    alert("Selamat ulang tahun Abil! Semoga makin dewasa... walau kelakuan masih bocil 😭🎉");
}

// bikin confetti
for(let i=0;i<40;i++){
    let confetti=document.createElement("div");
    confetti.className="confetti";
    confetti.style.left=Math.random()*100+"vw";
    confetti.style.background=`hsl(${Math.random()*360},100%,50%)`;
    confetti.style.animationDuration=(Math.random()*3+2)+"s";
    document.body.appendChild(confetti);
}

</script>

</body>
</html>
